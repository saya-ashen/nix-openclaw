name: Yolo Update Pins

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: write

concurrency:
  group: yolo-update-pins
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - name: Check latest CI on main
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_ci=$(gh run list --workflow CI --branch main --limit 1 --json status,conclusion)
          if [[ "$(jq 'length' <<<"$latest_ci")" -eq 0 ]]; then
            echo "No CI run on main yet; freezing yolo."
            echo "should_run=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          status=$(jq -r '.[0].status' <<<"$latest_ci")
          conclusion=$(jq -r '.[0].conclusion' <<<"$latest_ci")
          if [[ "$status" != "completed" || "$conclusion" != "success" ]]; then
            echo "Latest CI on main is ${status}/${conclusion}; freezing yolo."
            echo "should_run=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest CI on main is green; yolo may proceed."
          echo "should_run=true" >>"$GITHUB_OUTPUT"

  update:
    needs: guard
    if: ${{ needs.guard.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Run updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "openclaw-ci"
          git config user.email "ci@openclaw.local"
          scripts/update-pins.sh
